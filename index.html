<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Guriya ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Playfair Display', serif;
  background: linear-gradient(135deg, #2a001f, #5c003b, #ff1e56);
  background-size: 300% 300%;
  animation: bgMove 10s ease infinite;
  color: #fff;
  overflow: hidden;
}

@keyframes bgMove {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

.screen {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  padding: 20px;
}

.hidden { display: none; }

h1 {
  font-family: 'Great Vibes', cursive;
  font-size: 3.8rem;
  color: #ffd1dc;
  text-shadow: 0 0 20px rgba(255, 77, 109, 0.8);
}

button {
  padding: 14px 30px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(45deg,#ff4d6d,#ff1e56);
  color: white;
  font-size: 1rem;
  cursor: pointer;
  margin-top: 20px;
  box-shadow: 0 0 20px rgba(255,30,86,0.6);
}

button:hover {
  transform: scale(1.05);
}

.cake {
  width: 220px;
  margin-top: 20px;
  border-radius: 20px;
}

.shayari {
  margin-top: 20px;
  font-size: 1.2rem;
  line-height: 1.7;
  color: #ffe4ec;
}

.heart {
  position: absolute;
  color: #ff4d6d;
  animation: float 5s linear infinite;
}

@keyframes float {
  0% { transform: translateY(100vh); opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}

</style>
</head>
<body>

<!-- START -->
<div id="start" class="screen">
  <h1>For My Guriya ❤️</h1>
  <button onclick="startExperience()">Tap to Start Surprise ❤️</button>
  <button onclick="startWithMusic()">Start with Music 🎵</button>
</div>

<!-- CANDLE -->
<div id="candle" class="screen hidden">
  <h1>Make a Wish ✨</h1>
  <div style="font-size:80px">🕯️</div>
  <button onclick="nextStep()">Blow Candle 💨</button>
</div>

<!-- MAIN -->
<div id="main" class="screen hidden">
  <h1>Happy Birthday Guriya ❤️</h1>

  <img src="https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif" class="cake">

  <div class="shayari">
    Kajal ❤️ (29 April 2005)<br><br>

    Tum meri zindagi ka sabse khoobsurat hissa ho 💖<br>
    Tumhari hasi meri sabse badi khushi hai 😊<br><br>

    "Teri muskaan meri pehchaan hai,<br>
    Tu hi meri duniya, tu hi meri jaan hai... ❤️"
  </div>
</div>

<!-- Romantic Hindi Style Instrumental -->
<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2023/03/21/audio_5a2d4d4b55.mp3" type="audio/mpeg">
</audio>

<script>

function startExperience(){
  document.getElementById('start').classList.add('hidden');
  document.getElementById('candle').classList.remove('hidden');
}

function startWithMusic(){
  let m = document.getElementById('music');
  m.play().catch(()=>{});
  startExperience();
}

function nextStep(){
  document.getElementById('candle').classList.add('hidden');
  document.getElementById('main').classList.remove('hidden');
  startHearts();
}

function startHearts(){
  setInterval(()=>{
    let h = document.createElement('div');
    h.classList.add('heart');
    h.innerText='❤️';
    h.style.left=Math.random()*100+'vw';
    h.style.fontSize=(Math.random()*20+15)+'px';
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),5000);
  },200);
}

</script>

</body>
</html>
